<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Discador Interno</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }

        input {
            padding: 12px;
            font-size: 18px;
            width: 250px;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }

        .call {
            background-color: green;
            color: white;
        }

        .hangup {
            background-color: red;
            color: white;
        }

        #status {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Discador GRP</h1>

<input type="text" id="numero" placeholder="Digite o número">

<br>

<button class="call" onclick="ligar()">Ligar</button>
<button class="hangup" onclick="desligar()">Desligar</button>

<div id="status"></div>

<script>

function ligar() {
    let numero = document.getElementById("numero").value;

    if (!numero) {
        alert("Digite um número");
        return;
    }

    document.getElementById("status").innerText = "Ligando...";

    fetch("/call?number=" + numero)
        .then(response => response.json())
        .then(data => {
            document.getElementById("status").innerText = "Chamada enviada!";
        })
        .catch(error => {
            document.getElementById("status").innerText = "Erro ao ligar";
        });
}

function desligar() {
    fetch("/hangup")
        .then(response => response.json())
        .then(data => {
            document.getElementById("status").innerText = "Ligação encerrada!";
        })
        .catch(error => {
            document.getElementById("status").innerText = "Erro ao desligar";
        });
}

</script>

</body>
</html>
