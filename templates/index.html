<!DOCTYPE html>
<html>
<head>
    <title>Click to Call</title>
    <style>
        body { font-family: Arial; text-align: center; margin-top: 80px; }
        input { padding: 10px; font-size: 18px; width: 250px; }
        button { padding: 10px 20px; font-size: 18px; margin: 10px; cursor: pointer; }
        .call { background: green; color: white; }
        .hangup { background: red; color: white; }
        #status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<h1>Click to Call</h1>

<input type="text" id="number" placeholder="Digite o número">
<br>
<button class="call" onclick="makeCall()">Ligar</button>
<button class="hangup" onclick="hangup()">Desligar</button>

<div id="status"></div>

<script>
function makeCall() {
    let number = document.getElementById("number").value;

    fetch("/call", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: "number=" + number
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById("status").innerText = "Ligando...";
    });
}

function hangup() {
    fetch("/hangup", { method: "POST" })
    .then(response => response.json())
    .then(data => {
        document.getElementById("status").innerText = "Ligação encerrada.";
    });
}
</script>

</body>
</html>
